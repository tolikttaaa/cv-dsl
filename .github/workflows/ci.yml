name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify library, plugin and coverage
        run: ./gradlew --no-daemon clean check

      - name: Smoke-test the consumer example
        run: ./gradlew --no-daemon -p examples/simple clean generateWeb generateLatex

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload generated example
        uses: actions/upload-artifact@v4
        with:
          name: simple-example
          path: |
            examples/simple/build/web/
            examples/simple/build/latex/
          if-no-files-found: error
          retention-days: 14
