name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-artifacts:
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CV_DSL_VERSION: ${{ needs.release-please.outputs.tag-name }}
    steps:
      - name: Check out released tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag-name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify release and Maven publication
        run: ./gradlew --no-daemon clean check publishToMavenLocal

      - name: Build demo artifacts
        run: ./gradlew --no-daemon -p examples/simple clean generateWeb generateLatex

      - name: Package demo
        run: tar -czf cv-dsl-simple-example.tar.gz -C examples/simple/build web latex

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag-name }}
        run: gh release upload "$TAG_NAME" build/libs/*.jar cv-dsl-simple-example.tar.gz --clobber
