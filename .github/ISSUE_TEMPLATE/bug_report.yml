name: Bug report
description: Report incorrect DSL, rendering, generation or plugin behavior
title: "bug: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: cv-dsl version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [DSL/model, Web renderer, LaTeX renderer, Gradle plugin, Documentation]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest CV definition and command that reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
    validations:
      required: true
